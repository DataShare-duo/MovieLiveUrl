name: Daily generate movie_live

# 每天 10:00 Asia/Shanghai (UTC+8) -> 转换为 UTC 为 02:00 -> cron: "0 2 * * *"
# 如果你想每天 10:00 UTC，请用 "0 10 * * *"
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch: # 保留手动触发入口，便于测试
  
concurrency:
  group: movie-live-daily
  cancel-in-progress: false

jobs:
  run-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install requirements (if present)
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run live_source.py
        run: python live_source.py
      - name: List workspace (for debugging)
        run: ls -la .

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v7.1.0
        with:
          commit_message: "🤖 自动更新直播源 [skip ci]"
          commit_user_name: "GitHub Actions Bot"
          commit_user_email: "actions@github.com"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
